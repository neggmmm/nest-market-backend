services:

  # ─── NestJS API ─────────────────────────────────────────────────────────────
  api:
    image: neggmmm/medspot-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy   # wait until postgres is accepting connections
      redis:
        condition: service_healthy   # wait until redis is ready
    restart: unless-stopped

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    # No ports exposed — only the api container can reach it (internal network)
    environment:
      POSTGRES_USER:     ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB:       ${DATABASE_NAME:-nest_market}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-nest_market}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # No ports exposed — only the api container can reach it (internal network)
    # --requirepass sets the password from .env
    # --appendonly yes persists data to disk so cache survives restarts
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:     # postgres data survives container restarts
  redisdata:  # redis AOF log survives container restarts
